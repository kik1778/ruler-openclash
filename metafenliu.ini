[custom]
; ==========================================================
; 方案 A · 最终修正补全版（解决 Gemini 语音掉线 + Roblox 进不去）
; - 仅使用 GEOSITE / GEOIP（不引用不存在的 yaml）
; - 保留 HK / TW / JP / SG / US 五个 url-test 体系不动
; - 应用组已补全“🌐 全部节点”选项，支持一键切换全列表
; - 全节点手动 / 自动 只放在 Default / 漏网之鱼
; - 新增：🧊 冷门节点（排除 HK/JP/TW/US/SG），并让所有应用可选
; - Adobe 提供 REJECT（可禁止联网）
; - 修复：加入 Gemini 与 Roblox 专属规则，防止长连接断线与非标端口冲突
; ==========================================================
enable_rule_generator = true
overwrite_original_rules = true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude = 流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================
; 屏蔽adobe 给足权限排最上
ruleset = 🟥 Adobe,[]GEOSITE,adobe
ruleset = 🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网直连 ---
ruleset = DIRECT,[]GEOSITE,private
ruleset = DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset = DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset = DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset = 🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset = 🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连（ncego.com 等国内域名在此处触发直连）---
ruleset = DIRECT,[]GEOSITE,cn
ruleset = DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset = DIRECT,[]GEOSITE,google-cn
ruleset = DIRECT,[]GEOSITE,category-games@cn
ruleset = DIRECT,[]GEOSITE,category-game-platforms-download
ruleset = DIRECT,[]GEOSITE,category-public-tracker

; ------------请在下方区域内添加应用---------------
; --- 核心应用 ---
ruleset = 📦 Notion,[]GEOSITE,Notion
ruleset = 📦 Notion,[]GEOIP,Notion,no-resolve
ruleset = 📨 Telegram,[]GEOSITE,telegram
ruleset = 📨 Telegram,[]GEOIP,telegram,no-resolve

; --- AI 专区（精准剥离 Gemini 与 OpenAI，防止长连接断线） ---
ruleset = 🧠 Gemini,[]GEOSITE,gemini
ruleset = 🤖 ChatGPT,[]GEOSITE,openai
ruleset = 🧠 AI,[]GEOSITE,category-ai-!cn
ruleset = 🍎 Apple,[]GEOSITE,apple
ruleset = 🎬 YouTube,[]GEOSITE,youtube
ruleset = 🎥 Netflix,[]GEOSITE,netflix
ruleset = 🎥 Netflix,[]GEOIP,netflix,no-resolve

; --- 海外主流应用补充 ---
ruleset = 🎵 TikTok,[]GEOSITE,tiktok
ruleset = 🎵 TikTok,[]GEOIP,tiktok,no-resolve
ruleset = 📸 Instagram,[]GEOSITE,instagram
ruleset = 🐦 X,[]GEOSITE,twitter

; --- 开发 / 工具 / 游戏 ---
ruleset = 🛠 GitHub,[]GEOSITE,github
ruleset = 🛠 GitHub,[]GEOIP,github,no-resolve
ruleset = 🚝 测速工具,[]GEOSITE,category-speedtest
ruleset = 🎮 Steam,[]GEOSITE,steam
ruleset = 🎮 Roblox,[]GEOSITE,roblox

; --- 交易所 ---
ruleset = 🟦 OKX,[]GEOSITE,okx
ruleset = 🟨 Binance,[]GEOSITE,binance
ruleset = 🟪 Bybit,[]GEOSITE,bybit
; ------------请在上方区域内添加应用---------------

; --- 社交 / 通讯 ---
ruleset = 📞 即时通讯,[]GEOSITE,category-communication
ruleset = 💬 社交媒体,[]GEOSITE,category-social-media-!cn

; --- Google / Microsoft / Cloudflare ---
ruleset = ☁️ cloudflare,[]GEOSITE,cloudflare
ruleset = ☁️ cloudflare,[]GEOIP,cloudflare,no-resolve
ruleset = 🔎 Google,[]GEOSITE,google
ruleset = 🔎 Google,[]GEOIP,google,no-resolve
ruleset = 🪟 Microsoft,[]GEOSITE,microsoft
ruleset = 🪟 Microsoft,[]GEOIP,microsoft,no-resolve

; --- GFW 兜底 ---
ruleset = 🚀 手动选择,[]GEOSITE,gfw

; --- 非标端口 ---
ruleset = 🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; --- 最终兜底 ---
ruleset = 🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 应用分流策略组（UI 主入口）
; 说明：每个应用都加入了「🌐 全部节点」选项
; ==========================================================
; ------------请在下方区域内添加应用---------------
custom_proxy_group = 📦 Notion`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default
custom_proxy_group = 🍎 Apple`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default

; AI 策略组为了稳定性，保留原有国家池，但在最前面加上“🌐 全部节点”作为终极自选
custom_proxy_group = 🧠 Gemini`select`[]🌐 全部节点`[]🇺🇸 US`[]🇸🇬 SG`[]🇯🇵 JP`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🤖 ChatGPT`select`[]🌐 全部节点`[]🇺🇸 US`[]🇸🇬 SG`[]🇯🇵 JP`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🧠 AI`select`[]🌐 全部节点`[]🇺🇸 US`[]🇸🇬 SG`[]🇯🇵 JP`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🌐 Default

custom_proxy_group = 📨 Telegram`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 📞 即时通讯`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 💬 社交媒体`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🎬 YouTube`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🎥 Netflix`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🎵 TikTok`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 📸 Instagram`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🐦 X`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🛠 GitHub`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🚝 测速工具`select`[]DIRECT`[]🌐 全部节点`[]🧭 手动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🎮 Steam`select`[]DIRECT`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default

; 解决 Roblox 联机房间非标端口导致的卡连接问题，同样加入全部节点
custom_proxy_group = 🎮 Roblox`select`[]DIRECT`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🟦 OKX`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default
custom_proxy_group = 🟨 Binance`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default
custom_proxy_group = 🟪 Bybit`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default
; ------------请在上方区域内添加---------------

; Adobe：允许一键禁止联网
custom_proxy_group = 🟥 Adobe`select`[]REJECT`[]DIRECT`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = 🔎 Google`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group = ☁️ cloudflare`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default

; Microsoft：允许直连优先
custom_proxy_group = 🪟 Microsoft`select`[]DIRECT`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default

; ==========================================================
; 3) Default / 漏网之鱼
; ==========================================================
; 兜底“手动选择”
custom_proxy_group = 🚀 手动选择`select`[]♻️ 自动选择`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]DIRECT
; Default 出口
custom_proxy_group = 🌐 Default`select`[]🌐 全部节点`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group = 🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]🧊 冷门节点`[]🧭 手动选择`[]🚀 手动选择

; ==========================================================
; 4) 非标端口
; ==========================================================
custom_proxy_group = 🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group = 🐟 遵循规则`select`[]🐟 漏网之鱼

; ==========================================================
; 5) 国家节点测速组 / 正则提取源
; ==========================================================
custom_proxy_group = 🌐 全部节点`select`.*
custom_proxy_group = 🧭 手动选择`select`.*
custom_proxy_group = ♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇭🇰 HK`url-test`(?i)(🇭🇰|香港|\bHK\b|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇹🇼 TW`url-test`(?i)(🇹🇼|台湾|\bTW\\b|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇯🇵 JP`url-test`(?i)(🇯🇵|日本|\bJP\b|tokyo|osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇸🇬 SG`url-test`(?i)(🇸🇬|新加坡|\bSG\b|singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group = 🇺🇸 US`url-test`(?i)(🇺🇸|美国|\bUS\b|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300,,50

; 冷门节点池（排除五大区）
custom_proxy_group = 🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|\bHK\b|hong\s*kong|🇯🇵|日本|\bJP\b|tokyo|osaka|🇹🇼|台湾|\bTW\b|taiwan|taipei|hinet|🇸🇬|新加坡|\bSG\b|singapore|🇺🇸|美国|\bUS\b|united\s*states|los\s*angeles|san\s*jose|seattle|new\s*york)).*
